services:
  app:
    build:
      context: .
      target: development
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vinted:vinted@postgres:5432/vinted?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vinted
      POSTGRES_PASSWORD: vinted
      POSTGRES_DB: vinted
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vinted']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
